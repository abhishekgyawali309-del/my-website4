<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>+2 Colleges in Kathmandu</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;

            /* Background image with dark overlay */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
            url('https://nepalecoadventure.com/wp-content/uploads/2019/09/Kathmandu-Valley-Tour1.jpg');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        h1 {
            margin-bottom: 30px;
            color: white;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 250px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .card h2 {
            margin-bottom: 10px;
        }

        .card p {
            color: gray;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <h1>Top +2 Colleges in Kathmandu</h1>

    <div class="container">

        <div class="card">
            <img src="https://schoolsuryodaya.edu.np/image/sab-school-logo.jpg" alt="Suryodaya School Logo">
            <h2>Suryodaya School +2</h2>
            <p>Maitidevi, Kathmandu</p>
            <a href="https://schoolsuryodaya.edu.np/" target="_blank" class="btn">
                View Details
            </a>
        </div>

        <div class="card">
            <img src="https://www.trinity.edu.np/assets/frontend/img/loader-logo.png" alt="Trinity College">
            <h2>Trinity College</h2>
            <p>Dillibazar, Kathmandu</p>
            <a href="https://www.trinity.edu.np/" target="_blank" class="btn">
                View Details
            </a>
        </div>

        <div class="card">
            <img src="https://wms.edigitalnepal.com/wms/files/ws-profile/1746599021908_0553cb68-a1c2-4cb6-847c-ae1c76fe3848.png" alt="St. Xavier's College">
            <h2>St. Xavier's College</h2>
            <p>Maitighar, Kathmandu</p>
            <a href="https://www.sxc.edu.np/" target="_blank" class="btn">
                View Details
            </a>
        </div>

    </div>

</body>
</html>
